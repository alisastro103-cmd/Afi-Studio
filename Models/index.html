    <style>
        /* CSS TETAP SESUAI ASLINYA */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
 
        :root {
            --accent: #93C5FD;
            --accent-hover: #7DD3FC;
            --bg: #D0D7E1;
            --surface: #E1E7EE;
            --text: #334155;
            --text-sub: #64748B;
            --border: #B9C4D3;
            --grid-line: rgba(100,116,139,0.22);
        }

        html.dark {
            --accent: #3B5578;
            --accent-hover: #4A6690;
            --bg: #1E293B;
            --surface: #334155;
            --text: #CBD5E1;
            --text-sub: #94A3B8;
            --border: #475569;
            --grid-line: rgba(148,163,184,0.16);
        }
 
        body { background: var(--bg); color: var(--text); transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; zoom: 0.75; }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: -1;
        }
 
        .nav-bar { position: sticky; top: 0; z-index: 40; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 5px;
            margin-right: 10px;
        }
 
        .search-container { 
            position: relative; 
            margin-bottom: 24px; 
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
        }
        .search-container.active {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 20px;
        }
 
        .search-input { width: 100%; padding: 14px 18px 14px 48px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); outline: none; font-size: 14px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .filter-btn { 
            padding: 8px 16px; 
            border-radius: 3px; 
            background: var(--surface); 
            font-size: 13px; 
            font-weight: 600; 
            white-space: nowrap; 
            transition: all 0.3s ease; 
            color: var(--text);
            opacity: 0.6; 
        }
        .filter-btn.active { 
            background: var(--accent); 
            color: #fff; 
            border-color: var(--accent); 
            opacity: 1; 
        }
 
        /* Styling untuk Card Model agar konsisten */
        .model-card { 
            position: relative;
            cursor: pointer; 
            border-radius: 3px; 
            overflow: hidden; 
            transition: transform 0.2s, border-color 0.3s; 
            background: var(--surface); 
            border: 1px solid var(--border); 
        }
        .model-card:hover { 
            transform: translateY(-4px); 
            border-color: var(--accent-hover);
        }
        .app-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--accent);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 999px;
            z-index: 2;
        }
        .card-image { aspect-ratio: 16/9; object-fit: cover; width: 100%; }
        .card-content { padding: 12px; }
        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .card-caption { font-size: 12px; color: var(--text-sub); line-height: 1.4; }
 
        /* Modal Styling */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 480px; width: 92%; overflow: hidden; transform: scale(0.92); transition: transform 0.25s; position: relative; }
        .modal-overlay.active .modal-box { transform: scale(1); }

        /* Tombol bintang favorit - nempel di ujung board popup model */
        .modal-fav-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 5;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.45);
            border: none;
            cursor: pointer;
            color: #fff;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }
        .modal-fav-btn:hover { background: rgba(0,0,0,0.65); }
        .modal-fav-btn:active { transform: scale(0.9); }
        .modal-fav-btn svg { width: 17px; height: 17px; }
        .modal-fav-btn.is-favorited { color: #FBBF24; }
 
        .category-header {
            display: inline-flex;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            background: var(--surface);
            padding: 8px 14px;
            border-radius: 3px;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--text-sub);
            padding: 16px 0 28px;
            font-weight: 500;
        }

        #theme-toggle-btn .icon-moon { display: none; }
        html.dark #theme-toggle-btn .icon-sun { display: none; }
        html.dark #theme-toggle-btn .icon-moon { display: block; }

        /* Menu pindah halaman */
        .page-menu { position: relative; }
        .page-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 5px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .page-menu-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 190px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-6px) scale(0.98);
            transform-origin: top right;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }
        .page-menu-dropdown.open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        .page-menu-item {
            display: block;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
        }
        .page-menu-item:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
        .page-menu-item:active { opacity: 0.6; }
        .page-menu-item.active { color: var(--text); background: color-mix(in srgb, var(--accent) 10%, transparent); }
        html.dark .page-menu-item.active { color: #fff; }
        .page-menu-item.active::before {
            content: "";
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            margin-right: 8px;
            vertical-align: middle;
        }
        .page-menu-divider { height: 1px; background: var(--border); margin: 6px 4px; }
        .page-menu-item-cta { color: var(--text); display: flex; align-items: center; justify-content: space-between; }
        html.dark .page-menu-item-cta { color: #fff; }
        .page-menu-item-cta:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
        .page-menu-item-cta:active { opacity: 0.6; }
    </style>

    <style>
        .toast-daftar {
            position: fixed; bottom: 24px; left: 50%;
            transform: translate(-50%, 80px);
            background: var(--accent, #6c5ce7); color: #fff;
            padding: 12px 24px; border-radius: 999px;
            font-weight: 700; font-size: 14px;
            transition: transform 0.3s ease; z-index: 3000;
        }
        .toast-daftar.show { transform: translate(-50%, 0); }
    </style>
</head>

    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();

        (function () {
            const menuBtn = document.getElementById('page-menu-btn');
            const menuDropdown = document.getElementById('page-menu-dropdown');
            menuBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
            });
            document.addEventListener('click', function () {
                menuDropdown.classList.remove('open');
            });
        })();
 
        // Logika Toggle Pencarian (Visual Only)
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchWrapper = document.getElementById('search-wrapper');
        const searchInput = document.getElementById('search-input');
 
        if (searchToggleBtn) {
            searchToggleBtn.addEventListener('click', () => {
                searchWrapper.classList.toggle('active');
                if (searchWrapper.classList.contains('active')) {
                    setTimeout(() => searchInput.focus(), 300);
                }
            });
        }
    </script>
    <div id="toast-daftar" class="toast-daftar">Segera Hadir</div>
    <script src="/pwa-install.js" defer></script>
