<!doctype html>
<html lang="id" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afi Studio - Filter & Search</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        /* CSS TETAP SESUAI ASLINYA */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }

        :root {
            --accent: #99FFD9;
            --bg: #0f0f17;
            --surface: #1a1a2e;
            --text: #f0f0f5;
            --text-sub: #9ca3af;
            --border: #2a2a3e;
        }

        body { background: var(--bg); color: var(--text); }

        .nav-bar { position: sticky; top: 0; z-index: 40; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 5px;
            margin-right: 10px;
        }

        .search-container { 
            position: relative; 
            margin-bottom: 24px; 
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
        }
        .search-container.active {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 20px;
        }

        .search-input { width: 100%; padding: 14px 18px 14px 48px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); outline: none; font-size: 14px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .filter-btn { 
            padding: 8px 16px; 
            border-radius: 3px; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            font-size: 13px; 
            font-weight: 600; 
            white-space: nowrap; 
            transition: all 0.3s ease; 
            color: var(--text);
            opacity: 0.6; 
        }
        .filter-btn.active { 
            background: var(--accent); 
            color: #000; 
            border-color: var(--accent); 
            opacity: 1; 
        }

        /* Styling untuk Card Model agar konsisten */
        .model-card { 
            cursor: pointer; 
            border-radius: 3px; 
            overflow: hidden; 
            transition: transform 0.2s, border-color 0.3s; 
            background: var(--surface); 
            border: 1px solid var(--border); 
        }
        .model-card:hover { 
            transform: translateY(-4px); 
            border-color: var(--accent);
        }
        .card-image { aspect-ratio: 16/9; object-fit: cover; width: 100%; }
        .card-content { padding: 12px; }
        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .card-caption { font-size: 12px; color: var(--text-sub); line-height: 1.4; }

        /* Modal Styling */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 480px; width: 92%; overflow: hidden; transform: scale(0.92); transition: transform 0.25s; }
        .modal-overlay.active .modal-box { transform: scale(1); }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Outfit', sans-serif;
        }
        .category-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
            opacity: 0.6;
        }
    </style>
</head>

<body class="h-full">
    <div id="app" class="h-full overflow-auto w-full">
        <nav class="nav-bar">
            <div class="max-w-7xl mx-auto px-4 py-1.5 flex items-center justify-between">
                <div class="flex items-center">
                    <a href="../index.html" class="back-btn">
                        <i data-lucide="arrow-left" style="width: 24px;"></i>
                    </a>
                    <div class="cursor-pointer flex items-center gap-1">
                        <div style="font-family: 'Dancing Script', cursive; font-size: 20px; font-weight: 700; color: var(--text);">
                            Afi-Studio
                        </div>
                    </div>
                </div>

                <div class="flex gap-4"> 
                    <button id="search-toggle-btn" style="display: flex; align-items: center; justify-content: center; color: var(--text); padding: 5px;">
                        <i data-lucide="search" style="width: 20px;"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 pt-4 pb-6 sm:px-6">
            <div id="search-wrapper" class="search-container">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" style="width: 20px;"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Cari Model, Kategori, Creator...">
            </div>

            <div class="mt-2 mb-2">
                <h2 id="category-title" class="category-header text-xs font-bold uppercase tracking-widest opacity-60">SEMUA ITEM</h2>
            </div>

            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar" id="category-filter">
                </div>

            <section class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-5" id="content-grid">
                </section>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <img id="modal-thumb" src="" class="w-full aspect-video object-cover">
            <div class="p-5">
                <h2 id="modal-title" class="text-xl font-bold mb-2"></h2>
                <p id="modal-caption" class="text-xs mb-4 opacity-70"></p>
                <div id="info-container" class="rounded-xl p-4 mb-5 text-xs space-y-2" style="background: color-mix(in srgb, var(--accent) 10%, var(--surface));"></div>
                <div class="flex flex-col gap-2">
                    <button class="w-full py-3.5 rounded-xl font-bold bg-[var(--accent)] text-black" onclick="handleDownload()">Download Now</button>
                    <button class="w-full py-3.5 rounded-xl font-bold border border-[var(--border)]" onclick="handleCopyLink()">Copy Link</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[var(--accent)] text-black px-6 py-3 rounded-full font-bold text-sm translate-y-20 transition-transform shadow-lg">Link Disalin!</div>

    <script src="script.js"></script>

    <script>
        lucide.createIcons();

        // Logika Toggle Pencarian (Visual Only)
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchWrapper = document.getElementById('search-wrapper');
        const searchInput = document.getElementById('search-input');

        if (searchToggleBtn) {
            searchToggleBtn.addEventListener('click', () => {
                searchWrapper.classList.toggle('active');
                if (searchWrapper.classList.contains('active')) {
                    setTimeout(() => searchInput.focus(), 300);
                }
            });
        }
    </script>
</body>
</html>
