  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; font-weight: 600; }
 
    :root {
      --accent: #93C5FD;
            --accent-hover: #7DD3FC;
      --bg: #D0D7E1;
      --surface: #E1E7EE;
      --text: #334155;
      --text-light: #64748B;
      --border: #B9C4D3;
      --disabled: #94A3B8;
      --grid-line: rgba(100,116,139,0.22);
    }

    html.dark {
      --accent: #3B5578;
            --accent-hover: #4A6690;
            --bg: #1E293B;
      --surface: #334155;
      --text: #CBD5E1;
      --text-light: #94A3B8;
      --border: #475569;
      --disabled: #64748B;
      --grid-line: rgba(148,163,184,0.16);
    }
 
    body { 
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--text); 
      line-height: 1.4;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
 
    .header-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 24px 24px;
      text-align: center;
    }
 
    .header-title {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
 
    .header-subtitle {
      font-size: 15px;
      color: var(--text-light);
      font-weight: 500;
    }
 
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }
 
    .form-group {
      margin-bottom: 20px;
    }

    .label-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
    }

    .char-count {
      font-size: 12px;
      color: var(--text-light);
    }

    .form-input, .form-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
    }
 
    .btn {
      width: 100%;
      padding: 14px 40px;
      border: 2px solid var(--accent);
      background: var(--accent);
      color: #0f0f17;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: transparent;
      color: var(--text);
    }
 
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text-light);
      font-weight: 600;
      margin-top: 12px;
      text-decoration: none;
      display: block;
      text-align: center;
      padding: 12px;
      font-size: 14px;
    }
 
    .btn-secondary:hover {
      border-color: var(--text-light);
      color: var(--text);
    }
 
    .footer-note { text-align: center; font-size: 12px; color: var(--text-light); margin-top: 24px; }

    .captcha-wrapper {
      margin: 24px 0;
      display: flex;
      justify-content: center;
    }
    /* Navbar atas, konsisten dengan halaman lain */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 5px;
      margin-right: 10px;
    }

    #theme-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 5px;
      background: none;
      border: none;
      cursor: pointer;
    }
    #theme-toggle-btn .icon-moon { display: none; }
    html.dark #theme-toggle-btn .icon-sun { display: none; }
    html.dark #theme-toggle-btn .icon-moon { display: block; }

    /* Menu pindah halaman */
    .page-menu { position: relative; }
    .page-menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 5px;
      background: none;
      border: none;
      cursor: pointer;
    }
    .page-menu-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 190px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 50;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-6px) scale(0.98);
      transform-origin: top right;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
    }
    .page-menu-dropdown.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }
    .page-menu-item {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
    }
    .page-menu-item:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .page-menu-item.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

  </style>

   <div class="header-section">
    <h1 class="header-title" id="event-title">Feedback</h1>
    <p class="header-subtitle" id="event-desc">Bantu kami mengembangkan Afi Studio menjadi lebih baik</p>
   </div>

   <main>
    <form id="feedbackForm" onsubmit="sendFeedback(event)">
      
      <div class="form-group">
        <div class="label-wrapper">
          <label class="form-label" for="name">Nama Penulis</label>
          <span class="char-count" id="nameCount">0 / 50</span>
        </div>
        <input type="text" id="name" class="form-input" placeholder="Masukkan nama Anda..." required autocomplete="off" maxlength="50" oninput="updateCount('name', 'nameCount', 50)">
      </div>

      <div class="form-group">
        <div class="label-wrapper">
          <label class="form-label" for="message">Pesan / Masukan</label>
          <span class="char-count" id="msgCount">0 / 600</span>
        </div>
        <textarea id="message" class="form-textarea" placeholder="Tulis kritik, saran, atau masukan Anda di sini..." required maxlength="600" oninput="updateCount('message', 'msgCount', 600)"></textarea>
      </div>

      <div class="form-group">
        <div class="label-wrapper">
          <label class="form-label" for="imageFile">Lampirkan Gambar (Opsional, Maks 1MB)</label>
        </div>
        <input type="file" id="imageFile" class="form-input" accept="image/png, image/jpeg, image/jpg">
      </div>

      <div class="captcha-wrapper">
        <div class="g-recaptcha" data-sitekey="6LcxpEAtAAAAAHgoGI0JAei1dUeIjHQaESwDmFuv" data-theme="dark"></div>
      </div>
 
      <button type="submit" class="submit-btn btn" id="submit-btn">Kirim Feedback</button>
      
      <a href="../index.html" class="btn-secondary">Kembali ke halaman utama</a>
    </form>
 
    <p class="footer-note">Setiap masukan Anda sangat berarti bagi perkembangan proyek kami.</p>
   </main>

  <script>
    // Token Telegram TIDAK ADA DI SINI LAGI — sekarang aman di server (Vercel Environment Variables)

    (function () {
      const menuBtn = document.getElementById('page-menu-btn');
      const menuDropdown = document.getElementById('page-menu-dropdown');
      menuBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        menuDropdown.classList.toggle('open');
      });
      document.addEventListener('click', function () {
        menuDropdown.classList.remove('open');
      });
    })();

    // Fungsi real-time counter karakter saat user mengetik
    function updateCount(inputId, countId, maxLimit) {
      const input = document.getElementById(inputId);
      const countSpan = document.getElementById(countId);
      countSpan.innerText = `${input.value.length} / ${maxLimit}`;
    }

    async function sendFeedback(event) {
      event.preventDefault();

      const submitBtn = document.getElementById('submit-btn');
      const gCaptchaResponse = grecaptcha.getResponse();

      if (!gCaptchaResponse) {
        alert("Harap centang reCAPTCHA terlebih dahulu!");
        return;
      }

      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      const imageInput = document.getElementById('imageFile');
      const imageFile = imageInput.files[0];

      // 1. Validasi Sisi JavaScript (Proteksi Karakter Ganda)
      if (name.length > 50 || message.length > 600) {
        alert("Karakter melebihi batas yang ditentukan!");
        return;
      }

      if (name === "" || message === "") {
        alert("Nama dan Pesan wajib diisi dengan benar!");
        return;
      }

      // 2. Validasi Ukuran File Gambar (1 MB = 1.048.576 Bytes)
      if (imageFile && imageFile.size > 1048576) {
        alert("❌ File tidak valid! Ukuran gambar terlalu besar, maksimal adalah 1MB.");
        imageInput.value = ""; // Reset form gambar agar kosong kembali
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Mengirim...";

      // Kirim sebagai FormData ke endpoint sendiri (/api/feedback),
      // bukan langsung ke api.telegram.org lagi.
      const formData = new FormData();
      formData.append("name", name);
      formData.append("message", message);
      formData.append("g-recaptcha-response", gCaptchaResponse);
      if (imageFile) {
        formData.append("imageFile", imageFile);
      }

      try {
        const response = await fetch('/api/feedback', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (response.ok && result.success) {
          alert("Feedback berhasil dikirim ke Telegram! Terima kasih.");
          document.getElementById('feedbackForm').reset();
          // Reset counter tulisan kembali ke 0
          document.getElementById('nameCount').innerText = "0 / 50";
          document.getElementById('msgCount').innerText = "0 / 600";
        } else {
          alert("Gagal mengirim: " + (result.error || "Terjadi kesalahan sistem"));
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Terjadi kesalahan koneksi sistem.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Kirim Feedback";
        grecaptcha.reset();
      }
    }
  </script>
