    <style>
        /* --- RESET & ROOT --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }

        :root {
            --accent: #99FFD9;
            --bg: #ffffff;
            --surface: #f3f4f6;
            --text: #1a1a2e;
            --text-sub: #6b7280;
            --border: #e5e7eb;
        }

        .dark {
            --bg: #0f0f17;
            --surface: #1a1a2e;
            --text: #f0f0f5;
            --text-sub: #9ca3af;
            --border: #2a2a3e;
        }

        body { background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }

        .nav-bar { position: sticky; top: 0; z-index: 40; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        
        .search-container { 
            position: relative; 
            margin-bottom: 24px; 
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
        }
        .search-container.active {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 20px;
        }

        .search-input { width: 100%; padding: 14px 18px 14px 48px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); outline: none; transition: border-color 0.2s; font-size: 14px; }
        .search-input:focus { border-color: var(--accent); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .filter-btn { 
            padding: 8px 16px; 
            border-radius: 3px; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            font-size: 13px; 
            font-weight: 600; 
            white-space: nowrap; 
            transition: all 0.3s ease; 
            color: var(--text);
            opacity: 0.6; 
        }
        .filter-btn.active { 
            background: var(--accent); 
            color: #000; 
            border-color: var(--accent); 
            opacity: 1; 
        }

        .model-card { 
            cursor: pointer; 
            border-radius: 3px; 
            overflow: hidden; 
            transition: transform 0.2s, border-color 0.3s; 
            background: var(--surface); 
            border: 1px solid var(--border); 
        }
        .model-card:hover { 
            transform: translateY(-4px); 
            border-color: var(--accent);
        }
        .card-image { aspect-ratio: 16/9; object-fit: cover; width: 100%; }
        .card-content { padding: 12px; }
        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .card-caption { font-size: 12px; color: var(--text-sub); line-height: 1.4; }

        .contact-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .contact-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); text-decoration: none; transition: background 0.2s; }
        .contact-item:last-child { border-bottom: none; }
        .contact-item:hover { background: color-mix(in srgb, var(--text) 5%, transparent); }
        .contact-info { display: flex; align-items: center; gap: 14px; }
        .icon-circle { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .contact-label { font-weight: 700; font-size: 14px; color: var(--text); }
        .contact-sub { font-size: 11px; color: var(--text-sub); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 480px; width: 92%; overflow: hidden; transform: scale(0.92); transition: transform 0.25s; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        
        .settings-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 60; transition: right 0.3s; padding: 24px; }
        .settings-panel.open { right: 0; }
        .accent-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s; }
        .accent-dot.active { border-color: var(--text); transform: scale(1.1); }

        .banner-container { width: 100%; height: 180px; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); touch-action: pan-y; cursor: grab; }
        .banner-container:active { cursor: grabbing; }
        @media (min-width: 640px) { .banner-container { height: 250px; } }
        .banner-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .banner-link { min-width: 100%; height: 100%; display: block; flex-shrink: 0; pointer-events: auto; }
        .banner-slide { width: 100%; height: 100%; object-fit: cover; object-position: center; -webkit-user-drag: none; }

        .dots-container { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 0.5px solid rgba(0,0,0,0.1); transition: all 0.3s; cursor: pointer; }
        .dot.active { background: #fff; width: 14px; border-radius: 3px; }

        .marquee-bar { 
            background: var(--surface); 
            border-bottom: 1px solid var(--border);

            height: 1px;
            background: var(--border);
            opacity: 0.6;
        }
    </style>
</head>

    <script src="script.js"></script>

    <script>
        const container = document.getElementById('banner-container');
        const slider = document.getElementById('banner-slider');
        const dotsContainer = document.getElementById('dots-container');
        let currentIndex = 0;
        let startX, isDragging = false, currentTranslate = 0, prevTranslate = 0;
        let slideTimer;

        bannerData.forEach((item, index) => {
            const linkTag = document.createElement('a');
            linkTag.href = item.url;
            linkTag.target = "_blank";
            linkTag.className = 'banner-link';
            const imgTag = document.createElement('img');
            imgTag.src = item.img;
            imgTag.className = 'banner-slide';
            imgTag.alt = 'Banner Ads';
            linkTag.appendChild(imgTag);
            slider.appendChild(linkTag);

            const dot = document.createElement('div');
            dot.className = `dot ${index === 0 ? 'active' : ''}`;
            dot.onclick = () => goToSlide(index);
            dotsContainer.appendChild(dot);
        });

        function updateSlider() {
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
            prevTranslate = -currentIndex * container.offsetWidth;
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
            resetTimer();
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % bannerData.length;
            updateSlider();
        }

        function resetTimer() {
            clearInterval(slideTimer);
            slideTimer = setInterval(nextSlide, 5000);
        }

        container.addEventListener('mousedown', dragStart);
        container.addEventListener('touchstart', dragStart);
        container.addEventListener('mouseup', dragEnd);
        container.addEventListener('mouseleave', dragEnd);
        container.addEventListener('touchend', dragEnd);
        container.addEventListener('mousemove', dragAction);
        container.addEventListener('touchmove', dragAction);

        function dragStart(e) {
            isDragging = true;
            startX = (e.type.includes('mouse')) ? e.pageX : e.touches[0].clientX;
            clearInterval(slideTimer);
            slider.style.transition = 'none';
        }

        function dragAction(e) {
            if (!isDragging) return;
            const currentX = (e.type.includes('mouse')) ? e.pageX : e.touches[0].clientX;
            const diff = currentX - startX;
            const translate = prevTranslate + diff;
            slider.style.transform = `translateX(${translate}px)`;
        }

        function dragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            const endX = (e.type.includes('mouse')) ? e.pageX : (e.changedTouches ? e.changedTouches[0].clientX : startX);
            const movedBy = endX - startX;

            slider.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';

            if (movedBy < -100 && currentIndex < bannerData.length - 1) currentIndex++;
            else if (movedBy > 100 && currentIndex > 0) currentIndex--;

            updateSlider();
            resetTimer();
        }

        resetTimer();

        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchWrapper = document.getElementById('search-wrapper');
        const searchInput = document.getElementById('search-input');

        searchToggleBtn.addEventListener('click', () => {
            searchWrapper.classList.toggle('active');
            if (searchWrapper.classList.contains('active')) {
                setTimeout(() => searchInput.focus(), 300);
            } else {
                searchInput.value = '';
                searchInput.dispatchEvent(new Event('input'));
            }
        });
    </script>
