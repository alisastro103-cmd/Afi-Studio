<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afi Studio - Download Rig & 3D Models</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & ROOT --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }

        :root {
            --accent: #00d4aa;
            --bg: #ffffff;
            --surface: #f3f4f6;
            --text: #1a1a2e;
            --text-sub: #6b7280;
            --border: #e5e7eb;
        }

        .dark {
            --bg: #0f0f17;
            --surface: #1a1a2e;
            --text: #f0f0f5;
            --text-sub: #9ca3af;
            --border: #2a2a3e;
        }

        body { background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }

        .nav-bar { position: sticky; top: 0; z-index: 40; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        
        /* Modifikasi Search Container */
        .search-container { 
            position: relative; 
            margin-bottom: 24px; 
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
        }
        .search-container.active {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 20px;
        }

        .search-input { width: 100%; padding: 14px 18px 14px 48px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); outline: none; transition: border-color 0.2s; font-size: 14px; }
        .search-input:focus { border-color: var(--accent); }

        .model-card { cursor: pointer; border-radius: 12px; overflow: hidden; transition: transform 0.2s; background: var(--surface); border: 1px solid var(--border); }
        .model-card:hover { transform: translateY(-4px); }
        .card-image { aspect-ratio: 16/9; object-fit: cover; width: 100%; }
        .card-content { padding: 12px; }
        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .card-caption { font-size: 12px; color: var(--text-sub); line-height: 1.4; }

        .contact-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .contact-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); text-decoration: none; transition: background 0.2s; }
        .contact-item:last-child { border-bottom: none; }
        .contact-item:hover { background: color-mix(in srgb, var(--text) 5%, transparent); }
        .contact-info { display: flex; align-items: center; gap: 14px; }
        .icon-circle { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .contact-label { font-weight: 700; font-size: 14px; color: var(--text); }
        .contact-sub { font-size: 11px; color: var(--text-sub); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 480px; width: 92%; overflow: hidden; transform: scale(0.92); transition: transform 0.25s; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        
        .settings-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 60; transition: right 0.3s; padding: 24px; }
        .settings-panel.open { right: 0; }
        .accent-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s; }
        .accent-dot.active { border-color: var(--text); transform: scale(1.1); }

        /* Banner Carousel Styles */
        .banner-container { width: 100%; height: 180px; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
        @media (min-width: 640px) { .banner-container { height: 250px; } }
        .banner-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .banner-link { min-width: 100%; height: 100%; display: block; flex-shrink: 0; }
        .banner-slide { width: 100%; height: 100%; object-fit: cover; object-position: center; }
    </style>
</head>

<body class="h-full">

                            </div>

                            <div class="icon-circle" style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);">

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">

            <div class="p-5">

                <p id="modal-caption" class="text-xs mb-4 opacity-70"></p>

                <div class="flex flex-col gap-2">

    <aside id="settings-panel" class="settings-panel">

        </div>
    </aside>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[var(--accent)] text-black px-6 py-3 rounded-full font-bold text-sm translate-y-20 transition-transform shadow-lg">Link Disalin!</div>

    <script src="script.js"></script>

    <script>
        // Logika Banner
        const bannerData = [
            { img: "Banner1.jpg", url: "https://www.contoh.com/" },
            { img: "Banner2.jpg", url: "event/index.html" },
            { img: "Banner3.jpg", url: "event/index.html" },
            { img: "Banner4.jpg", url: "https://www.contoh.com/" }
        ];

        const slider = document.getElementById('banner-slider');
        let currentIndex = 0;

        bannerData.forEach(item => {
            const linkTag = document.createElement('a');
            linkTag.href = item.url;
            linkTag.target = "_blank";
            linkTag.className = 'banner-link';

            const imgTag = document.createElement('img');
            imgTag.src = item.img;
            imgTag.className = 'banner-slide';
            imgTag.alt = 'Banner Ads';

            linkTag.appendChild(imgTag);
            slider.appendChild(linkTag);
        });

        function autoSlide() {
            currentIndex++;
            if (currentIndex >= bannerData.length) currentIndex = 0;
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
        }

        if (bannerData.length > 1) setInterval(autoSlide, 5000);

        // --- Logika Pencarian Baru ---
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchWrapper = document.getElementById('search-wrapper');
        const searchInput = document.getElementById('search-input');

        searchToggleBtn.addEventListener('click', () => {
            searchWrapper.classList.toggle('active');
            
            // Fokus otomatis ke input jika aktif
            if (searchWrapper.classList.contains('active')) {
                setTimeout(() => searchInput.focus(), 300);
            } else {
                searchInput.value = ''; // Opsional: reset pencarian saat ditutup
                // Trigger event input untuk mereset filter di script.js (jika ada)
                searchInput.dispatchEvent(new Event('input'));
            }
        });
    </script>
</body>
</html>
