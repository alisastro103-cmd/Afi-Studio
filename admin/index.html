<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — Afi Studio</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root {
    --accent: #93C5FD;
    --accent-hover: #7DD3FC;
    --bg: #D0D7E1;
    --surface: #E1E7EE;
    --text: #334155;
    --text-sub: #64748B;
    --border: #B9C4D3;
    --danger: #EF4444;
  }
  html.dark {
    --accent: #3B5578;
    --accent-hover: #4A6690;
    --bg: #1E293B;
    --surface: #334155;
    --text: #CBD5E1;
    --text-sub: #94A3B8;
    --border: #475569;
    --danger: #F87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  h1, h2, h3, button, .label { font-family: 'Outfit', sans-serif; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 80px; }
  header.top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  header.top h1 { font-size: 1.25rem; font-weight: 700; margin: 0; }
  header.top .sub { color: var(--text-sub); font-size: 0.8rem; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab-btn {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-weight: 600; font-size: 0.85rem;
    cursor: pointer;
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: transparent; }
  label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-sub); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 0.03em; }
  input, textarea, select {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  }
  textarea { resize: vertical; min-height: 60px; }
  .btn {
    padding: 10px 16px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer;
    font-size: 0.85rem;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: var(--danger); color: #fff; }
  .row-actions { display: flex; gap: 6px; margin-top: 10px; }
  .item {
    display: flex; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 10px; align-items: flex-start;
  }
  .item img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg); }
  .item .meta { flex: 1; min-width: 0; }
  .item .meta .name { font-weight: 700; font-size: 0.9rem; }
  .item .meta .sub { font-size: 0.78rem; color: var(--text-sub); }
  .form-actions { display: flex; gap: 8px; margin-top: 14px; }
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  #login-box { width: 100%; max-width: 340px; }
  #app { display: none; }
  .error-text { color: var(--danger); font-size: 0.8rem; margin-top: 6px; }
  .empty { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 24px 0; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
</style>
</head>
<body>

<div id="login-screen">
  <div id="login-box" class="card">
    <h2 style="margin-top:0;">Masuk Admin</h2>
    <p class="sub" style="color:var(--text-sub); font-size:0.85rem;">Afi Studio — panel kelola konten</p>
    <label>Password</label>
    <input type="password" id="login-password" placeholder="Password admin" onkeydown="if(event.key==='Enter') doLogin()">
    <div id="login-error" class="error-text"></div>
    <div class="form-actions">
      <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">Masuk</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Admin Afi Studio</h1>
        <div class="sub">Kelola konten tanpa edit JSON manual</div>
      </div>
      <button class="btn btn-ghost" onclick="doLogout()">Keluar</button>
    </header>

    <div class="tabs">
      <button class="tab-btn active" id="tab-models" onclick="switchTab('models')">Models</button>
      <button class="tab-btn" id="tab-members" onclick="switchTab('members')">Members</button>
    </div>

    <!-- MODELS -->
    <div id="panel-models">
      <div class="card">
        <h3 id="model-form-title" style="margin-top:0;">Tambah Model Baru</h3>
        <input type="hidden" id="model-id">
        <label>Nama</label>
        <input id="model-name" placeholder="contoh: Rig Mob Minecraft">
        <label>Caption</label>
        <textarea id="model-caption" placeholder="Deskripsi singkat"></textarea>
        <label>Creator</label>
        <input id="model-creator" placeholder="Nama pembuat asli (boleh kosong)">
        <label>Converter</label>
        <input id="model-converter" placeholder="Nama yang konversi">
        <label>Kategori (pisahkan koma — ketik bebas, kategori baru otomatis muncul jadi tab filter, kategori yang sudah tidak dipakai model manapun otomatis hilang)</label>
        <input id="model-category" placeholder="Minecraft, Rig, Mob, Free" list="category-suggestions">
        <datalist id="category-suggestions"></datalist>
        <label>Untuk Aplikasi</label>
        <select id="model-app-target" onchange="toggleAppOther()">
          <option value="">— Pilih aplikasi —</option>
          <option value="Prisma3D">Prisma3D</option>
          <option value="Blender">Blender</option>
          <option value="Mine-Imator">Mine-Imator</option>
          <option value="Viontri">Viontri</option>
          <option value="C4D">C4D</option>
          <option value="__other__">Lainnya (isi manual)</option>
        </select>
        <input id="model-app-target-other" placeholder="Nama aplikasi lain" style="display:none; margin-top:6px;">
        <label>URL Thumbnail</label>
        <input id="model-thumb" placeholder="https://...">
        <label>URL Download/Link</label>
        <input id="model-link" placeholder="https://...">
        <div id="model-error" class="error-text"></div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveModel()">Simpan</button>
          <button class="btn btn-ghost" onclick="resetModelForm()">Batal</button>
        </div>
      </div>

      <div class="toolbar">
        <h3 style="margin:0;">Daftar Model</h3>
        <span class="sub" id="models-count"></span>
      </div>
      <div id="models-list"></div>
    </div>

    <!-- MEMBERS -->
    <div id="panel-members" style="display:none;">
      <div class="card">
        <h3 id="member-form-title" style="margin-top:0;">Tambah Member Baru</h3>
        <input type="hidden" id="member-id">
        <label>Kode Grup (unik per generasi, contoh: gen-1, gen-2, gen-4, atau nama grup baru bebas — grup baru otomatis muncul di halaman)</label>
        <input id="member-gen-id" placeholder="gen-4">
        <label>Nama</label>
        <input id="member-nama" placeholder="Nama member">
        <label>Spesialis</label>
        <input id="member-spesialis" placeholder="contoh: Animator, Modeller">
        <label>Identitas (emoji)</label>
        <input id="member-identitas" placeholder="🍁">
        <label>Generasi (teks yang ditampilkan)</label>
        <input id="member-generasi" placeholder="Generasi ke-1">
        <label>URL Foto</label>
        <input id="member-foto" placeholder="profile/nama.webp atau URL">
        <label>Sosial media (JSON, boleh kosong)</label>
        <textarea id="member-socials" placeholder='{"yt":"","ig":"","fb":"","tk":"","wa":"","dc":""}'></textarea>
        <div id="member-error" class="error-text"></div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveMember()">Simpan</button>
          <button class="btn btn-ghost" onclick="resetMemberForm()">Batal</button>
        </div>
      </div>

      <div class="toolbar">
        <h3 style="margin:0;">Daftar Member</h3>
        <span class="sub" id="members-count"></span>
      </div>
      <div id="members-list"></div>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = 'afi-admin-token';

function getToken() { return localStorage.getItem(TOKEN_KEY); }

function authHeaders() {
  return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
}

async function doLogin() {
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const res = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    if (!res.ok) {
      errEl.textContent = 'Password salah, coba lagi.';
      return;
    }
    localStorage.setItem(TOKEN_KEY, password);
    showApp();
  } catch (e) {
    errEl.textContent = 'Gagal menghubungi server.';
  }
}

function doLogout() {
  localStorage.removeItem(TOKEN_KEY);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadModels();
  loadMembers();
}

function switchTab(tab) {
  document.getElementById('panel-models').style.display = tab === 'models' ? 'block' : 'none';
  document.getElementById('panel-members').style.display = tab === 'members' ? 'block' : 'none';
  document.getElementById('tab-models').classList.toggle('active', tab === 'models');
  document.getElementById('tab-members').classList.toggle('active', tab === 'members');
}

function toggleAppOther() {
  const sel = document.getElementById('model-app-target');
  const other = document.getElementById('model-app-target-other');
  other.style.display = sel.value === '__other__' ? 'block' : 'none';
}

// ---------- MODELS ----------
let modelsCache = [];

async function loadModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    if (!res.ok || !Array.isArray(data)) {
      console.error('api/models error response:', data);
      document.getElementById('models-list').innerHTML =
        `<div class="empty" style="color:var(--danger);">Gagal memuat data: ${escapeHtml(JSON.stringify(data))}</div>`;
      document.getElementById('models-count').textContent = '';
      modelsCache = [];
      return;
    }
    modelsCache = data;
    renderModelsList();
    fillCategorySuggestions();
  } catch (e) {
    console.error('loadModels fetch failed:', e);
    document.getElementById('models-list').innerHTML =
      `<div class="empty" style="color:var(--danger);">Gagal menghubungi /api/models.</div>`;
    modelsCache = [];
  }
}

function fillCategorySuggestions() {
  const set = new Set();
  modelsCache.forEach(m => (m.category || []).forEach(c => c && set.add(c)));
  const dl = document.getElementById('category-suggestions');
  if (dl) dl.innerHTML = Array.from(set).sort().map(c => `<option value="${escapeHtml(c)}">`).join('');
}

function renderModelsList() {
  const list = document.getElementById('models-list');
  document.getElementById('models-count').textContent = modelsCache.length + ' item';
  if (!modelsCache.length) {
    list.innerHTML = '<div class="empty">Belum ada model. Tambahkan lewat form di atas.</div>';
    return;
  }
  list.innerHTML = modelsCache.map(m => `
    <div class="item">
      <img src="${m.thumb || ''}" onerror="this.style.visibility='hidden'">
      <div class="meta">
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="sub">${escapeHtml((m.category || []).join(', '))}${m.app_target ? ' · <b>' + escapeHtml(m.app_target) + '</b>' : ''}</div>
        <div class="row-actions">
          <button class="btn btn-ghost" onclick="editModel(${m.id})">Edit</button>
          <button class="btn btn-danger" onclick="deleteModel(${m.id})">Hapus</button>
        </div>
      </div>
    </div>
  `).join('');
}

function editModel(id) {
  const m = modelsCache.find(x => x.id === id);
  if (!m) return;
  document.getElementById('model-id').value = m.id;
  document.getElementById('model-name').value = m.name || '';
  document.getElementById('model-caption').value = m.caption || '';
  document.getElementById('model-creator').value = m.creator || '';
  document.getElementById('model-converter').value = m.converter || '';
  document.getElementById('model-category').value = (m.category || []).join(', ');
  const presetApps = ['Prisma3D', 'Blender', 'Mine-Imator', 'Viontri', 'C4D'];
  const sel = document.getElementById('model-app-target');
  const other = document.getElementById('model-app-target-other');
  if (m.app_target && !presetApps.includes(m.app_target)) {
    sel.value = '__other__';
    other.value = m.app_target;
    other.style.display = 'block';
  } else {
    sel.value = m.app_target || '';
    other.value = '';
    other.style.display = 'none';
  }
  document.getElementById('model-thumb').value = m.thumb || '';
  document.getElementById('model-link').value = m.link || '';
  document.getElementById('model-form-title').textContent = 'Edit Model';
  window.scrollTo(0, 0);
}

function resetModelForm() {
  ['model-id','model-name','model-caption','model-creator','model-converter','model-category','model-thumb','model-link','model-app-target-other']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('model-app-target').value = '';
  document.getElementById('model-app-target-other').style.display = 'none';
  document.getElementById('model-form-title').textContent = 'Tambah Model Baru';
  document.getElementById('model-error').textContent = '';
}

async function saveModel() {
  const id = document.getElementById('model-id').value;
  const errEl = document.getElementById('model-error');
  const name = document.getElementById('model-name').value.trim();
  if (!name) { errEl.textContent = 'Nama wajib diisi.'; return; }

  const selVal = document.getElementById('model-app-target').value;
  const appTarget = selVal === '__other__'
    ? document.getElementById('model-app-target-other').value.trim()
    : selVal;

  const payload = {
    name,
    caption: document.getElementById('model-caption').value.trim(),
    creator: document.getElementById('model-creator').value.trim(),
    converter: document.getElementById('model-converter').value.trim(),
    category: document.getElementById('model-category').value.split(',').map(s => s.trim()).filter(Boolean),
    app_target: appTarget,
    thumb: document.getElementById('model-thumb').value.trim(),
    link: document.getElementById('model-link').value.trim(),
  };

  const url = id ? `/api/models?id=${id}` : '/api/models';
  const method = id ? 'PUT' : 'POST';

  const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(payload) });
  if (!res.ok) { errEl.textContent = 'Gagal menyimpan. Cek koneksi database.'; return; }
  resetModelForm();
  loadModels();
}

async function deleteModel(id) {
  if (!confirm('Hapus model ini?')) return;
  await fetch(`/api/models?id=${id}`, { method: 'DELETE', headers: authHeaders() });
  loadModels();
}

// ---------- MEMBERS ----------
let membersCache = [];

async function loadMembers() {
  try {
    const res = await fetch('/api/members');
    const data = await res.json();
    if (!res.ok || !Array.isArray(data)) {
      console.error('api/members error response:', data);
      document.getElementById('members-list').innerHTML =
        `<div class="empty" style="color:var(--danger);">Gagal memuat data: ${escapeHtml(JSON.stringify(data))}</div>`;
      document.getElementById('members-count').textContent = '';
      membersCache = [];
      return;
    }
    membersCache = data;
    renderMembersList();
  } catch (e) {
    console.error('loadMembers fetch failed:', e);
    document.getElementById('members-list').innerHTML =
      `<div class="empty" style="color:var(--danger);">Gagal menghubungi /api/members.</div>`;
    membersCache = [];
  }
}

function renderMembersList() {
  const list = document.getElementById('members-list');
  document.getElementById('members-count').textContent = membersCache.length + ' member';
  if (!membersCache.length) {
    list.innerHTML = '<div class="empty">Belum ada member. Tambahkan lewat form di atas.</div>';
    return;
  }
  list.innerHTML = membersCache.map(m => `
    <div class="item">
      <img src="${m.foto || ''}" onerror="this.style.visibility='hidden'">
      <div class="meta">
        <div class="name">${escapeHtml(m.identitas || '')} ${escapeHtml(m.nama)}</div>
        <div class="sub">${escapeHtml(m.spesialis || '')} · ${escapeHtml(m.generasi || '')} · <code>${escapeHtml(m.gen_id || '')}</code></div>
        <div class="row-actions">
          <button class="btn btn-ghost" onclick="editMember(${m.id})">Edit</button>
          <button class="btn btn-danger" onclick="deleteMember(${m.id})">Hapus</button>
        </div>
      </div>
    </div>
  `).join('');
}

function editMember(id) {
  const m = membersCache.find(x => x.id === id);
  if (!m) return;
  document.getElementById('member-id').value = m.id;
  document.getElementById('member-gen-id').value = m.gen_id || '';
  document.getElementById('member-nama').value = m.nama || '';
  document.getElementById('member-spesialis').value = m.spesialis || '';
  document.getElementById('member-identitas').value = m.identitas || '';
  document.getElementById('member-generasi').value = m.generasi || '';
  document.getElementById('member-foto').value = m.foto || '';
  document.getElementById('member-socials').value = JSON.stringify(m.socials || {});
  document.getElementById('member-form-title').textContent = 'Edit Member';
  window.scrollTo(0, 0);
}

function resetMemberForm() {
  ['member-id','member-gen-id','member-nama','member-spesialis','member-identitas','member-generasi','member-foto','member-socials']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('member-form-title').textContent = 'Tambah Member Baru';
  document.getElementById('member-error').textContent = '';
}

async function saveMember() {
  const id = document.getElementById('member-id').value;
  const errEl = document.getElementById('member-error');
  const nama = document.getElementById('member-nama').value.trim();
  const genId = document.getElementById('member-gen-id').value.trim();
  if (!nama) { errEl.textContent = 'Nama wajib diisi.'; return; }
  if (!genId) { errEl.textContent = 'Kode Grup wajib diisi (contoh: gen-1).'; return; }

  let socials = {};
  const socialsRaw = document.getElementById('member-socials').value.trim();
  if (socialsRaw) {
    try { socials = JSON.parse(socialsRaw); }
    catch { errEl.textContent = 'Format JSON sosial media salah.'; return; }
  }

  const payload = {
    gen_id: genId,
    nama,
    spesialis: document.getElementById('member-spesialis').value.trim(),
    identitas: document.getElementById('member-identitas').value.trim(),
    generasi: document.getElementById('member-generasi').value.trim(),
    foto: document.getElementById('member-foto').value.trim(),
    socials,
  };

  const url = id ? `/api/members?id=${id}` : '/api/members';
  const method = id ? 'PUT' : 'POST';

  const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(payload) });
  if (!res.ok) { errEl.textContent = 'Gagal menyimpan. Cek koneksi database.'; return; }
  resetMemberForm();
  loadMembers();
}

async function deleteMember(id) {
  if (!confirm('Hapus member ini?')) return;
  await fetch(`/api/members?id=${id}`, { method: 'DELETE', headers: authHeaders() });
  loadMembers();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Auto-login kalau token tersimpan masih valid
(async function init() {
  const token = getToken();
  if (!token) return;
  const res = await fetch('/api/admin-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: token }),
  });
  if (res.ok) showApp();
  else localStorage.removeItem(TOKEN_KEY);
})();

// Ikuti tema sistem seperti halaman lain
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.classList.add('dark');
}
</script>
</body>
</html>
