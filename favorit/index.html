    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }

        :root {
            --accent: #93C5FD;
            --accent-hover: #7DD3FC;
            --bg: #D0D7E1;
            --surface: #E1E7EE;
            --text: #334155;
            --text-sub: #64748B;
            --border: #B9C4D3;
            --grid-line: rgba(100,116,139,0.22);
        }

        html.dark {
            --accent: #3B5578;
            --accent-hover: #4A6690;
            --bg: #1E293B;
            --surface: #334155;
            --text: #CBD5E1;
            --text-sub: #94A3B8;
            --border: #475569;
            --grid-line: rgba(148,163,184,0.16);
        }

        body { background: var(--bg); color: var(--text); transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; zoom: 0.75; }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: -1;
        }

        .nav-bar { position: sticky; top: 0; z-index: 40; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 5px;
            margin-right: 10px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .category-header {
            display: inline-flex;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            background: var(--surface);
            padding: 8px 14px;
            border-radius: 3px;
        }

        main {
            opacity: 0;
            transform: translateY(10px);
            animation: section-fade-in 0.5s ease forwards;
        }
        @keyframes section-fade-in {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardRevealUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fav-grid .tutorial-card,
        .fav-grid .model-card {
            animation: cardRevealUp 0.45s ease-out both;
        }

        /* Grid favorit: 2-4 kolom, wrap ke bawah, ada jarak di setiap sisi kartu */
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px 10px;
        }
        @media (min-width: 640px) {
            .fav-grid { grid-template-columns: repeat(3, 1fr); gap: 20px 14px; }
        }
        @media (min-width: 1024px) {
            .fav-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* Kartu video (dipakai ulang dari halaman Video & Tutorial) */
        .tutorial-card { cursor: pointer; width: 100%; }
        .tutorial-thumb-wrap { position: relative; overflow: hidden; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }
        .tutorial-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; transition: transform 0.25s; }
        .tutorial-card:hover .tutorial-thumb { transform: scale(1.03); }
        .tutorial-play-badge { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); transition: background 0.2s; }
        .tutorial-card:hover .tutorial-play-badge { background: rgba(0,0,0,0.3); }
        .tutorial-play-badge svg { width: 56px; height: 56px; color: #fff; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
        .tutorial-card-title { padding: 10px 4px 0; font-size: 15px; font-weight: 700; line-height: 1.35; word-wrap: break-word; overflow-wrap: break-word; }

        /* Kartu model (dipakai ulang dari halaman Model) */
        .model-card { position: relative; cursor: pointer; border-radius: 6px; overflow: hidden; transition: transform 0.2s, border-color 0.3s; background: var(--surface); border: 1px solid var(--border); }
        .model-card:hover { transform: translateY(-4px); border-color: var(--accent-hover); }
        .app-badge { position: absolute; top: 8px; right: 8px; background: var(--accent); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 999px; z-index: 2; }
        .card-image { aspect-ratio: 16/9; object-fit: cover; width: 100%; }
        .card-content { padding: 12px; }
        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .card-caption { font-size: 12px; color: var(--text-sub); line-height: 1.4; }

        .fav-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; opacity: 0.6; }

        /* Modal video */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 480px; width: 92%; overflow: hidden; transform: scale(0.92); transition: transform 0.25s; position: relative; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .video-modal-box { max-width: 760px; width: 94%; border-radius: 3px !important; position: relative; }
        .video-frame-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .video-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
        .video-modal-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .video-youtube-btn { display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); text-decoration: none; transition: background 0.2s, color 0.2s; }
        .video-youtube-btn:hover { background: var(--accent); color: #fff; }
        .video-youtube-btn svg { width: 16px; height: 16px; }

        /* Tombol bintang favorit - nempel di ujung board popup */
        .modal-fav-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 5;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.45);
            border: none;
            cursor: pointer;
            color: #fff;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }
        .modal-fav-btn:hover { background: rgba(0,0,0,0.65); }
        .modal-fav-btn:active { transform: scale(0.9); }
        .modal-fav-btn svg { width: 17px; height: 17px; }
        .modal-fav-btn.is-favorited { color: #FBBF24; }

        .footer-text { text-align: center; font-size: 11px; color: var(--text-sub); padding: 16px 0 28px; font-weight: 500; }

        #theme-toggle-btn .icon-moon { display: none; }
        html.dark #theme-toggle-btn .icon-sun { display: none; }
        html.dark #theme-toggle-btn .icon-moon { display: block; }

        /* Menu pindah halaman */
        .page-menu { position: relative; }
        .page-menu-btn { display: flex; align-items: center; justify-content: center; color: var(--text); padding: 5px; background: none; border: none; cursor: pointer; }
        .page-menu-dropdown {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            min-width: 190px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 6px;
            display: flex; flex-direction: column; gap: 2px; z-index: 50;
            opacity: 0; visibility: hidden; pointer-events: none;
            transform: translateY(-6px) scale(0.98); transform-origin: top right;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }
        .page-menu-dropdown.open { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0) scale(1); }
        .page-menu-item { display: block; padding: 10px 12px; border-radius: 8px; color: var(--text); text-decoration: none; font-size: 13px; font-weight: 600; font-family: 'Outfit', sans-serif; }
        .page-menu-item:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
        .page-menu-item:active { opacity: 0.6; }
        .page-menu-item.active { color: #fff; background: color-mix(in srgb, var(--accent) 10%, transparent); }
        .page-menu-item.active::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: currentColor; margin-right: 8px; vertical-align: middle; }
        .page-menu-divider { height: 1px; background: var(--border); margin: 6px 4px; }
        .page-menu-item-cta { color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .page-menu-item-cta:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
        .page-menu-item-cta:active { opacity: 0.6; }
    </style>

    <style>
        .toast-daftar {

            background: var(--accent, #6c5ce7); color: #fff;
            padding: 12px 24px; border-radius: 999px;
            font-weight: 700; font-size: 14px;
            transition: transform 0.3s ease; z-index: 3000;
        }
        .toast-daftar.show { transform: translate(-50%, 0); }
    </style>
</head>
